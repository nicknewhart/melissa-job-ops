<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Ops — Melissa Moreira</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--bg2:#161616;--bg3:#1e1e1e;--bg4:#2a2a2a;
  --border:#2a2a2a;--border2:#3a3a3a;
  --green:#4ade80;--green-bg:#052e16;--green-border:#166534;
  --yellow:#facc15;--yellow-bg:#1a1000;--yellow-border:#713f12;
  --red:#f87171;--red-bg:#1a0000;--red-border:#7f1d1d;
  --blue:#60a5fa;--blue-bg:#0c1f3a;--blue-border:#1e3a5f;
  --purple:#c084fc;--purple-bg:#1a0533;--purple-border:#6b21a8;
  --text:#efefef;--text2:#aaa;--text3:#555;
  --mono:'Geist Mono',monospace;--sans:'DM Sans',sans-serif;
  --r:8px;--r2:12px;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;min-height:100vh;line-height:1.6}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

#app{display:flex;flex-direction:column;min-height:100vh}

/* HEADER */
header{height:56px;border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:100}
.logo{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--green);letter-spacing:0.08em}
.logo span{color:var(--text3);font-weight:400}
.header-right{display:flex;align-items:center;gap:14px}
.api-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:6px}
.api-label{font-family:var(--mono);font-size:11px;color:var(--text3)}
.main{flex:1;display:flex;overflow:hidden}

/* NAV */
nav{display:flex;gap:2px}
.nav-btn{font-family:var(--mono);font-size:11px;font-weight:500;padding:6px 13px;border-radius:var(--r);border:none;background:transparent;color:var(--text2);cursor:pointer;letter-spacing:0.05em;text-transform:uppercase;transition:all 0.15s}
.nav-btn:hover{color:var(--text);background:var(--bg3)}
.nav-btn.on{color:var(--green);background:var(--bg3)}

/* SIDEBAR */
.sidebar{width:260px;min-width:260px;border-right:1px solid var(--border);padding:16px 12px;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.slab{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;padding:0 6px;margin-bottom:2px}
.sidebar-filters{display:flex;gap:4px;padding:0 2px;margin-bottom:2px}
.sf-btn{font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;letter-spacing:0.05em;text-transform:uppercase;transition:all 0.15s}
.sf-btn:hover{color:var(--text2);border-color:var(--border2)}
.sf-btn.on{background:var(--purple-bg);border-color:var(--purple-border);color:var(--purple)}

.hist-item{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:var(--r);border:1px solid var(--border);cursor:pointer;transition:all 0.15s;background:var(--bg2)}
.hist-item:hover{border-color:var(--border2);background:var(--bg3)}
.hist-item.on{border-color:var(--green-border);background:var(--green-bg)}
.hist-item.applied{border-color:var(--purple-border)}
.hgrade{font-family:var(--mono);font-size:12px;font-weight:600;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hA{background:#052e16;color:#4ade80}.hB{background:#1c3a08;color:#86efac}
.hC{background:#1a1000;color:#facc15}.hD{background:#1a0800;color:#fb923c}
.hF{background:#1a0000;color:#f87171}
.hinfo{flex:1;min-width:0}
.htitle{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hco{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.hdate{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:2px}
.hloc{display:inline-block;font-family:var(--mono);font-size:9px;font-weight:500;padding:2px 6px;border-radius:3px;background:var(--bg4);color:var(--text2);margin-top:3px;border:1px solid var(--border2)}
.hloc.remote{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.hloc.eu{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-border)}
.hloc.us{background:var(--yellow-bg);color:var(--yellow);border-color:var(--yellow-border)}
.applied-dot{width:8px;height:8px;border-radius:50%;background:var(--purple);flex-shrink:0;opacity:0;transition:opacity 0.15s}
.applied-dot.on{opacity:1}
.no-hist{font-family:var(--mono);font-size:12px;color:var(--text3);text-align:center;padding:20px 0}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 12px;outline:none;transition:border-color 0.15s;margin-bottom:4px}
.search-input:focus{border-color:var(--border2)}
.search-input::placeholder{color:var(--text3)}
.sync-bar{display:flex;align-items:center;gap:6px;padding:4px 2px;margin-bottom:4px}
.sync-status{font-family:var(--mono);font-size:9px;color:var(--text3);flex:1;letter-spacing:0.04em}
.sync-status.ok{color:var(--green)}
.sync-status.err{color:var(--red)}
.sync-status.syncing{color:var(--yellow)}
.sync-btn{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;letter-spacing:0.05em;text-transform:uppercase;transition:all 0.15s;white-space:nowrap}
.sync-btn:hover{color:var(--text);border-color:var(--border2)}
.key-setup{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px;display:flex;flex-direction:column;gap:8px;margin-bottom:4px}
.key-setup p{font-size:12px;color:var(--text2);line-height:1.5}
.key-setup input{background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:11px;padding:7px 10px;outline:none;width:100%}
.key-setup input:focus{border-color:var(--border2)}

/* CONTENT */
.content{flex:1;padding:28px 36px;overflow-y:auto;max-width:860px}
.panel{display:none;flex-direction:column;gap:20px}
.panel.on{display:flex}

/* FORMS */
.field{display:flex;flex-direction:column}
label.fl{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text2);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:8px;display:block}
textarea,select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:14px;padding:12px 14px;outline:none;transition:border-color 0.15s;resize:vertical;line-height:1.65}
textarea:focus,select:focus{border-color:var(--border2)}
textarea::placeholder{color:var(--text3);font-size:14px}
select{resize:none;cursor:pointer;-webkit-appearance:none;appearance:none;padding:11px 14px}

/* BUTTONS */
.btn{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:10px 20px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg3);color:var(--text);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.btn:hover{background:var(--bg4)}
.btn:active{transform:scale(0.98)}
.btn-primary{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.btn-primary:hover{background:#064820}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.btn-applied{background:var(--purple-bg);border-color:var(--purple-border);color:var(--purple)}
.btn-applied:hover{background:#2d0a5e}
.btn-applied.is-applied{opacity:0.8}
.btn-sm{font-size:10px;padding:6px 13px}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--text2)}
.btn-ghost:hover{color:var(--text);border-color:var(--border2);background:transparent}
.row-end{display:flex;justify-content:flex-end;gap:8px;align-items:center}
.row{display:flex;gap:12px}

/* SCORE CARD */
.score-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:22px;display:flex;flex-direction:column;gap:18px}
.sc-top{display:flex;align-items:flex-start;gap:16px}
.sc-badge{font-family:var(--mono);font-size:32px;font-weight:600;width:66px;height:66px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bA{background:#052e16;color:#4ade80;border:1px solid #166534}
.bB{background:#1c3a08;color:#86efac;border:1px solid #166534}
.bC{background:#1a1000;color:#facc15;border:1px solid #713f12}
.bD{background:#1a0800;color:#fb923c;border:1px solid #7c2d12}
.bF{background:#1a0000;color:#f87171;border:1px solid #7f1d1d}
.sc-meta{flex:1;min-width:0}
.sc-role{font-size:20px;font-weight:500;color:var(--text);line-height:1.3;margin-bottom:4px}
.sc-co{font-size:14px;color:var(--text2);margin-bottom:10px}
.sc-pills{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.verdict-pill{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.08em;padding:4px 10px;border-radius:5px}
.vAPPLY{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.vMAYBE{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-border)}
.vSKIP{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.salary-pill{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.06em;padding:4px 10px;border-radius:5px;background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.applied-pill{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.06em;padding:4px 10px;border-radius:5px;background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border);display:none}
.applied-pill.on{display:inline-block}
.sc-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.sc-grade-inline{display:none;font-size:13px;font-weight:600;width:28px;height:28px;border-radius:6px;flex-shrink:0;margin-right:8px;vertical-align:middle;position:relative;top:-1px}
.btn-applied .short-label{display:none}
.btn-applied .full-label{display:inline}

/* DIMS */
.dims{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dim{background:var(--bg3);border-radius:var(--r);padding:13px 15px;border:1px solid var(--border)}
.dname{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:8px}
.dnote{font-size:12px;color:var(--text3);margin-top:5px;font-style:italic;line-height:1.5}
.dbar-row{display:flex;align-items:center;gap:8px}
.dbar{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.dfill{height:100%;border-radius:2px;transition:width 0.6s ease}
.dhi{background:var(--green)}.dmid{background:var(--yellow)}.dlo{background:var(--red)}
.dpct{font-family:var(--mono);font-size:11px;color:var(--text2);min-width:28px;text-align:right;font-weight:500}

.pill-row{display:flex;flex-wrap:wrap;gap:6px}
.pill{font-family:var(--mono);font-size:11px;padding:4px 9px;border-radius:5px;font-weight:500}
.pg{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.pr{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.pb{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}

.sc-summary{font-size:14px;line-height:1.75;color:var(--text2);border-top:1px solid var(--border);padding-top:16px}
.sdiv{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:7px;margin-bottom:10px}

/* COMPANY INFO */
.company-info{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;display:flex;flex-direction:column;gap:10px}
.ci-row{display:flex;align-items:center;gap:10px}
.ci-label{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;min-width:50px}
.ci-val{font-size:13px;color:var(--text);word-break:break-all}
.ci-val a{color:var(--blue);text-decoration:none}
.ci-val a:hover{text-decoration:underline}
.ci-loading{font-family:var(--mono);font-size:11px;color:var(--text3);font-style:italic}

/* FOLLOW-UP */
.followup-card{background:var(--purple-bg);border:1px solid var(--purple-border);border-radius:var(--r2);padding:20px 22px;display:flex;flex-direction:column;gap:14px}
.followup-title{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--purple);letter-spacing:0.08em;text-transform:uppercase}
.followup-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fu-item{display:flex;flex-direction:column;gap:5px}
.fu-label{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em}
.fu-val{font-size:13px;color:var(--text2)}
.fu-val a{color:var(--blue);text-decoration:none}
.fu-val a:hover{text-decoration:underline}
.fu-notes textarea{background:var(--bg2);border:1px solid var(--purple-border);border-radius:var(--r);color:var(--text);font-size:13px;padding:10px 12px;resize:vertical;line-height:1.6;min-height:80px}
.fu-notes textarea:focus{border-color:var(--purple);outline:none}
.fu-notes textarea::placeholder{color:var(--text3)}

/* LOADER */
.loader{display:none;flex-direction:column;gap:8px}
.loader.on{display:flex}
.ltext{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:0.05em}
.lbar{height:2px;background:var(--bg4);border-radius:1px;overflow:hidden}
.lfill{height:100%;width:30%;background:var(--green);border-radius:1px;animation:lp 1.5s ease-in-out infinite}
@keyframes lp{0%{transform:translateX(-200%)}100%{transform:translateX(500%)}}

/* OUTPUT */
.out-wrap{display:none;flex-direction:column;gap:10px}
.out-wrap.on{display:flex}
.out-head{display:flex;align-items:center;justify-content:space-between}
.out-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;font-size:14px;line-height:1.8;color:var(--text);white-space:pre-wrap}

/* GEN TABS */
.gtabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--r);padding:3px;width:fit-content}
.gtab{font-family:var(--mono);font-size:11px;padding:6px 14px;border-radius:6px;border:none;background:transparent;color:var(--text2);cursor:pointer;letter-spacing:0.05em;text-transform:uppercase;transition:all 0.15s}
.gtab.on{background:var(--bg2);color:var(--text)}
.gtab:hover:not(.on){color:var(--text)}
.gblock{display:none;flex-direction:column;gap:16px}
.gblock.on{display:flex}

/* Q SLOTS */
.q-slot{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:15px;display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
.q-top{display:flex;justify-content:space-between;align-items:center}
.qn{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase}
.qrm{font-family:var(--mono);font-size:11px;color:var(--text3);background:transparent;border:none;cursor:pointer;transition:color 0.15s}
.qrm:hover{color:var(--red)}
.add-q{font-family:var(--mono);font-size:11px;color:var(--text3);background:transparent;border:1px dashed var(--border);border-radius:var(--r);padding:10px;cursor:pointer;width:100%;text-align:center;letter-spacing:0.05em;transition:all 0.15s}
.add-q:hover{color:var(--text2);border-color:var(--border2)}

.section-sep{border:none;border-top:1px solid var(--border);margin:4px 0}

/* ── MOBILE NAV BAR ── */
.mobile-nav{
  position:fixed;bottom:0;left:0;right:0;
  height:64px;
  background:var(--bg2);
  border-top:1px solid var(--border);
  display:none;
  align-items:stretch;
  z-index:200;
  padding-bottom:env(safe-area-inset-bottom);
}
.mob-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;border:none;background:transparent;color:var(--text3);cursor:pointer;
  font-family:var(--mono);font-size:9px;letter-spacing:0.05em;text-transform:uppercase;
  transition:all 0.15s;padding:10px 0;-webkit-tap-highlight-color:transparent;
}
.mob-btn.on{color:var(--green)}
.mob-btn.on .mob-icon{background:var(--green-bg);border-color:var(--green-border)}
.mob-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid transparent;transition:all 0.15s;margin-bottom:1px}
.mob-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* ── HISTORY DRAWER ── */
.hist-drawer{
  display:none;position:fixed;bottom:64px;left:0;right:0;
  background:var(--bg2);border-top:1px solid var(--border);
  z-index:190;max-height:60vh;overflow-y:auto;
  padding:12px;flex-direction:column;gap:6px;
  transform:translateY(100%);transition:transform 0.25s ease;
}
.hist-drawer.open{transform:translateY(0)}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:0 4px 8px;border-bottom:1px solid var(--border);margin-bottom:4px}
.drawer-title{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase}
.drawer-close{font-family:var(--mono);font-size:10px;color:var(--text3);background:transparent;border:none;cursor:pointer;padding:4px 8px}
.drawer-filters{display:flex;gap:4px;margin-bottom:8px}

@media(min-width:769px){
  .mobile-nav{display:none!important}
  .hist-drawer{display:none!important}
}

@media(max-width:768px){
  /* layout */
  header{padding:0 16px;height:52px}
  .logo span{display:none}
  .api-label{display:none}
  .main{flex-direction:column;padding-bottom:72px}
  .sidebar{display:none!important}
  .content{padding:14px 14px 20px;max-width:100%}
  .panel{gap:14px}

  /* show mobile nav */
  .mobile-nav{display:flex}
  nav{display:none}

  /* show history drawer when open */
  .hist-drawer{display:flex}

  /* forms - prevent iOS zoom */
  textarea{font-size:16px;padding:12px;min-height:120px}
  select{font-size:16px;padding:11px 12px}
  input[type=text]{font-size:16px;padding:11px 12px}
  label.fl{font-size:11px;margin-bottom:6px}

  /* evaluate panel */
  #jd-in{min-height:180px;font-size:15px}
  .row-end .btn-primary{width:100%;padding:13px;font-size:12px}

  /* score card - mobile optimized */
  .score-card{padding:14px;gap:14px}
  .sc-top{flex-direction:column;gap:0}
  .sc-badge{display:none}
  .sc-grade-inline{display:inline-flex}
  .sc-meta{width:100%}
  .sc-role{font-size:18px;line-height:1.25;margin-bottom:3px;padding-right:0}
  .sc-co{font-size:13px;margin-bottom:8px}
  .sc-pills{gap:5px;margin-top:0;flex-wrap:wrap}
  .sc-actions{width:100%;margin-top:10px}
  .sc-actions .btn{width:100%;padding:11px;font-size:11px;letter-spacing:0.08em}
  .btn-applied .full-label{display:none}
  .btn-applied .short-label{display:inline}
  .btn-applied.is-applied{opacity:1}
  .dims{grid-template-columns:1fr;gap:8px}
  .dim{padding:11px 13px}
  .dname{font-size:13px}
  .dnote{font-size:11px}
  .sc-summary{font-size:13px;line-height:1.7;padding-top:12px}
  .pill{font-size:10px;padding:3px 8px}

  /* follow-up */
  .followup-card{padding:14px 16px;gap:12px}
  .followup-grid{grid-template-columns:1fr 1fr;gap:8px}

  /* generate */
  .gtabs{width:100%;margin-bottom:4px}
  .gtab{flex:1;text-align:center;padding:7px 8px;font-size:10px}
  .row{flex-direction:column;gap:10px}
  .out-box{font-size:13px;line-height:1.7;padding:14px}

  /* buttons in out-head */
  .out-head{flex-wrap:wrap;gap:8px}
  .out-head>div{display:flex;gap:6px;width:100%}
  .out-head .btn-ghost,.out-head .btn-applied{flex:1;text-align:center}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">JOB-OPS <span>/ Melissa Moreira</span></div>
    <div class="header-right">
      <div class="api-label"><span class="api-dot"></span>Ready</div>
      <nav>
        <button class="nav-btn on" onclick="sw('evaluate',this)">Evaluate</button>
        <button class="nav-btn" onclick="sw('generate',this)">Generate</button>
        <button class="nav-btn" onclick="sw('qa',this)">Q&A</button>
      </nav>
    </div>
  </header>

  <div class="main">
    <div class="sidebar">
      <div class="slab">History</div>
      <div id="key-setup-block" class="key-setup" style="display:none">
        <p>Paste your sync key to load your evaluations on this device.</p>
        <input type="text" id="sync-key-input" placeholder="Paste your sync key..." />
        <button class="sync-btn" style="align-self:flex-start;padding:5px 12px" onclick="activateSyncKey()">Load data</button>
      </div>
      <div class="sync-bar">
        <span class="sync-status" id="sync-status">Not synced</span>
        <button class="sync-btn" onclick="showSyncSetup()" id="sync-setup-btn" title="Sync settings">⚙ Sync</button>
      </div>
      <input type="text" class="search-input" id="search-input" placeholder="Search roles or companies..." oninput="renderHist()" />
      <div class="sidebar-filters">
        <button class="sf-btn on" onclick="setFilter('all',this)">All</button>
        <button class="sf-btn" onclick="setFilter('applied',this)">Applied</button>
      </div>
      <div id="hist-list"><div class="no-hist">No evaluations yet</div></div>
    </div>

    <div class="content">

      <!-- EVALUATE -->
      <div class="panel on" id="panel-evaluate">
        <div class="field">
          <label class="fl">Job Description</label>
          <textarea id="jd-in" rows="10" placeholder="Paste the full job description here. Include role title, company, responsibilities, requirements, location, and comp if listed."></textarea>
        </div>
        <div class="row-end">
          <button class="btn btn-primary" id="eval-btn" onclick="evalJob()">Analyze role →</button>
        </div>
        <div class="loader" id="eval-load">
          <div class="ltext">Analyzing fit against your profile...</div>
          <div class="lbar"><div class="lfill"></div></div>
        </div>
        <div id="eval-result"></div>
      </div>

      <!-- GENERATE -->
      <div class="panel" id="panel-generate">
        <div class="gtabs">
          <button class="gtab on" onclick="swG('cl',this)">Cover letter</button>
          <button class="gtab" onclick="swG('rb',this)">Resume bullets</button>
        </div>
        <div class="gblock on" id="gen-cl">
          <div class="field"><label class="fl">Job Description</label><textarea id="gen-jd" rows="6" placeholder="Paste JD here, or select a role from history — it auto-fills."></textarea></div>
          <div class="row">
            <div class="field" style="flex:1"><label class="fl">Tone</label>
              <select id="tone"><option value="direct">Direct and confident</option><option value="warm">Warm and collaborative</option><option value="technical">Technical and precise</option><option value="creative">Creative and energetic</option></select>
            </div>
            <div class="field" style="flex:1"><label class="fl">Length</label>
              <select id="length"><option value="short">Short (3 paragraphs)</option><option value="standard" selected>Standard (4 paragraphs)</option><option value="detailed">Detailed (5 paragraphs)</option></select>
            </div>

          </div>
          <div class="row-end"><button class="btn btn-primary" id="cl-btn" onclick="genCL()">Generate cover letter →</button></div>
          <div class="loader" id="cl-load"><div class="ltext">Writing your cover letter...</div><div class="lbar"><div class="lfill"></div></div></div>
          <div class="out-wrap" id="cl-wrap">
            <div class="out-head"><label class="fl" style="margin:0">Cover letter</label><div style="display:flex;gap:6px"><button class="btn btn-sm btn-ghost" onclick="cp('cl-out')">Copy</button><button class="btn btn-sm btn-applied" onclick="downloadCLPdf()">Download PDF</button></div></div>
            <div class="out-box" id="cl-out"></div>
          </div>
        </div>
        <div class="gblock" id="gen-rb">
          <div class="field"><label class="fl">Job Description</label><textarea id="gen-jd-rb" rows="6" placeholder="Paste JD here, or select from history."></textarea></div>
          <div class="row-end"><button class="btn btn-primary" id="rb-btn" onclick="genRB()">Generate bullets →</button></div>
          <div class="loader" id="rb-load"><div class="ltext">Tailoring resume bullets...</div><div class="lbar"><div class="lfill"></div></div></div>
          <div class="out-wrap" id="rb-wrap"><div class="out-head"><label class="fl" style="margin:0">Resume bullets</label><button class="btn btn-sm btn-ghost" onclick="cp('rb-out')">Copy</button></div><div class="out-box" id="rb-out"></div></div>
        </div>
      </div>

      <!-- Q&A -->
      <div class="panel" id="panel-qa">
        <div class="field"><label class="fl">Job Description (for context)</label><textarea id="qa-jd" rows="4" placeholder="Paste JD so answers are role-specific..."></textarea></div>
        <div id="q-slots"></div>
        <button class="add-q" id="add-q" onclick="addQ()">+ Add question</button>
        <div class="row-end"><button class="btn btn-primary" id="qa-btn" onclick="genQA()">Generate answers →</button></div>
        <div class="loader" id="qa-load"><div class="ltext">Generating answers in your voice...</div><div class="lbar"><div class="lfill"></div></div></div>
        <div class="out-wrap" id="qa-wrap"><div class="out-head"><label class="fl" style="margin:0">Application answers</label><button class="btn btn-sm btn-ghost" onclick="cp('qa-out')">Copy</button></div><div class="out-box" id="qa-out"></div></div>
      </div>

    </div>
  </div>

  <!-- HISTORY DRAWER (mobile) -->
  <div class="hist-drawer" id="hist-drawer">
    <div class="drawer-header">
      <span class="drawer-title">History</span>
      <button class="drawer-close" onclick="closeDrawer()">Close</button>
    </div>
    <div id="mob-sync-block" style="margin-bottom:8px"></div>
    <input type="text" class="search-input" id="search-input-drawer" placeholder="Search roles or companies..." oninput="syncSearchInputs(this);renderHist();renderDrawerHist()" style="margin-bottom:8px" />
    <div class="drawer-filters">
      <button class="sf-btn on" onclick="setFilter('all',this)">All</button>
      <button class="sf-btn" onclick="setFilter('applied',this)">Applied</button>
    </div>
    <div id="hist-list-drawer"></div>
  </div>

  <!-- MOBILE BOTTOM NAV -->
  <div class="mobile-nav">
    <button class="mob-btn on" id="mob-evaluate" onclick="mobSw('evaluate',this)">
      <div class="mob-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>
      Evaluate
    </button>
    <button class="mob-btn" id="mob-generate" onclick="mobSw('generate',this)">
      <div class="mob-icon"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></div>
      Generate
    </button>
    <button class="mob-btn" id="mob-qa" onclick="mobSw('qa',this)">
      <div class="mob-icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
      Q&A
    </button>
    <button class="mob-btn" id="mob-history" onclick="toggleDrawer(this)">
      <div class="mob-icon"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z"/><path d="M12 6v6l4 2"/></svg></div>
      History
    </button>
  </div>
</div>

<script>
const PROFILE = `PERSON: Melissa Moreira, 30 years old, Brazilian-Portuguese.
LOCATION: Portugal. Prefers remote work. Open to relocation outside Portugal (not within Portugal). No relocation within Portugal.
COMPENSATION FLOOR: €1,000/month net minimum. Portugal and EU market rates.

TARGET ROLES (in priority order):
1. Junior Graphic Designer — this is the primary target. Her degree is in Graphic Design.
2. Translator / Language roles — Portuguese (native) and English (C1). Brazilian-Portuguese speaker gives her an edge for Brazilian market roles.
3. Customer Service / Call Centre — already proven, Teleperformance 2023-2025, bilingual.
4. Admin, operations, or coordination roles requiring bilingual communication.
AVOID: Anything sales-adjacent, commission-based, cold outreach, or growth-hacking. These are a hard no.

SKILLS:
- Graphic design foundations: typography, colour theory, layout, brand identity, visual communication (Estácio de Sá University degree, 2014-2017)
- Drawing and illustration (active on Instagram, personal portfolio in development)
- Figma — currently learning, actively developing
- Microsoft Office
- Bilingual: Portuguese (native, Brazilian and European), English (C1 professional)
- Strong communication and interpersonal skills from 2+ years in call centre environment
- Fast learner, organised, proactive, team player
- Customer-facing experience across multiple industries

WORK HISTORY:
- Call Centre Agent, Teleperformance, 07/2023-07/2025, Portugal. Inbound/outbound calls, bilingual (EN/PT), CRM systems, customer enquiries.
- Cashier, McDonald's, 08/2022-01/2023, Portugal.
- Waitress, O'Gillins Irish Pub, 10/2021-03/2022, Portugal.
- Waitress, Buona Pizza, 10/2019-01/2020, Portugal.
- Cashier, Ymart Supermercado, 08/2017-11/2017, Brazil.

EDUCATION: Bachelor's Degree in Graphic Design, Estácio de Sá University, Brazil, 2014-2017.

PORTFOLIO: Instagram illustrations (personal work, in development). Figma portfolio coming soon. No formal UX portfolio yet — do NOT penalise heavily for junior graphic design roles where personal work is acceptable.

CONTACT: lemelissa_@hotmail.com | +351 936 992 658

WRITING STYLE FOR ALL GENERATED CONTENT: First person. Warm and direct. Sounds like a real person, not a robot. A bit of personality is fine. Professional but not stiff. Short paragraphs. No corporate buzzwords. No em dashes.`;

const SCORE_SYS = `You are a job fit evaluator for Melissa Moreira.\n\n${PROFILE}\n\nEvaluate the job description and return ONLY valid JSON:\n{"role_title":"string","company":"string","verdict":"APPLY|MAYBE|SKIP","grade":"A|B|C|D|F","salary":"string or null","location":"string or null","summary":"2-3 honest sentences","dimensions":[{"name":"Role Alignment","score":0,"note":"brief"},{"name":"Skill Match","score":0,"note":"brief"},{"name":"Location / Remote","score":0,"note":"brief"},{"name":"Seniority Level","score":0,"note":"brief"},{"name":"Industry Fit","score":0,"note":"brief"},{"name":"Comp Signal","score":0,"note":"brief or not listed"}],"strengths":["..."],"gaps":["..."],"highlights":["..."]}\n\nFor "salary": extract any mentioned comp range exactly as written, or null. For "location": extract job location as short label e.g. "Remote", "Austin TX", "London UK", "EU Remote", "Hybrid NYC". If not mentioned use null.\nRULES: Score Location 90-100 for remote roles or relocation outside Portugal (EU countries, international). Score 30-50 if role requires in-person within Portugal (she prefers remote). Score Industry Fit LOW for anything sales, commission, cold outreach, or growth-hacking — hard avoids. For junior graphic design roles, do NOT penalise lack of formal portfolio — Instagram illustration work is valid. Grade A=strong, B=good minor gaps, C=possible gaps, D=reach, F=skip. Verdict: APPLY for A/B, MAYBE for C, SKIP for D/F. Return ONLY JSON.`;

const COMPANY_PROMPT = company => `Find the website and a contact/careers email for "${company}". Return ONLY valid JSON: {"website":"string or null","careers_email":"string or null","careers_page":"string or null"}. Use null if not found. Return ONLY the JSON object.`;

const clPrompt = (jd,tone,len) => `Write a cover letter FOR Melissa Moreira.\n\n${PROFILE}\n\nJD: ${jd}\nTONE: ${tone}\nLENGTH: ${len==='short'?'3 paragraphs':len==='standard'?'4 paragraphs':'5 paragraphs'}\n\nOpen with specific hook (not "I am writing to apply"). Reference real projects. Speak to company context. Confident close. Use "Hi [Company] team,". Follow Nick's writing style. Output letter text only.`;
const rbPrompt = jd => `Write tailored resume bullets FOR Melissa Moreira.\n\n${PROFILE}\n\nJD: ${jd}\n\n6-8 bullets from Nick's REAL experience ordered by what this role values. Strong action verbs. Real metrics where they exist. Max 20 words each. Each starts with (•). Output only bullets.`;
const qaPrompt = (jd,qs) => `Answer application questions FOR Melissa Moreira.\n\n${PROFILE}\n\nJD: ${jd||'(none)'}\n\nQUESTIONS:\n${qs.map((q,i)=>`${i+1}. ${q}`).join('\n')}\n\nDirect answers from real experience. 2-5 sentences each. First person, no em dashes, conversational.\n\nFormat:\nQ1: [question]\nA1: [answer]\n\nQ2: [question]\nA2: [answer]`;

// STATE
let history = JSON.parse(localStorage.getItem('jo_hist') || '[]');
let selIdx = null;
let qCount = 0;
let activeFilter = 'all';
let syncKey = localStorage.getItem('jo_sync_key') || '';
let syncTimeout = null;

window.onload = () => {
  renderHist();
  addQ();
  if (syncKey) {
    loadFromSupabase();
  } else {
    document.getElementById('key-setup-block').style.display = 'block';
    setSyncStatus('Set up sync key', '');
  }
};

// ── SEARCH ──────────────────────────────────────────────────────────────────
function getSearchQuery() {
  const s = document.getElementById('search-input');
  const sd = document.getElementById('search-input-drawer');
  return (s?.value || sd?.value || '').toLowerCase().trim();
}

function syncSearchInputs(src) {
  const val = src.value;
  const s = document.getElementById('search-input');
  const sd = document.getElementById('search-input-drawer');
  if (s && s !== src) s.value = val;
  if (sd && sd !== src) sd.value = val;
}

// ── SYNC ────────────────────────────────────────────────────────────────────
function setSyncStatus(msg, state) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  el.textContent = msg;
  el.className = 'sync-status' + (state ? ' ' + state : '');
}

function showSyncSetup() {
  const block = document.getElementById('key-setup-block');
  if (!block) return;
  const isVisible = block.style.display !== 'none';
  block.style.display = isVisible ? 'none' : 'block';
  if (!isVisible && syncKey) {
    document.getElementById('sync-key-input').value = syncKey;
  }
}

function activateSyncKey() {
  const inp = document.getElementById('sync-key-input');
  const key = inp?.value.trim();
  if (!key) { alert('Paste a sync key first.'); return; }
  syncKey = key;
  localStorage.setItem('jo_sync_key', syncKey);
  document.getElementById('key-setup-block').style.display = 'none';
  loadFromSupabase();
}

async function loadFromSupabase() {
  if (!syncKey) return;
  setSyncStatus('Loading...', 'syncing');
  try {
    const res = await fetch('/api/sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'load', userKey: syncKey })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    if (data.evals && data.evals.length > 0) {
      history = data.evals;
      localStorage.setItem('jo_hist', JSON.stringify(history));
    }
    setSyncStatus('Synced ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), 'ok');
    renderHist();
  } catch(e) {
    setSyncStatus('Sync failed', 'err');
    console.error('Load error:', e);
  }
}

async function saveToSupabase() {
  if (!syncKey) return;
  setSyncStatus('Saving...', 'syncing');
  try {
    const res = await fetch('/api/sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'save', userKey: syncKey, data: history })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    setSyncStatus('Saved ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), 'ok');
  } catch(e) {
    setSyncStatus('Save failed', 'err');
    console.error('Save error:', e);
  }
}

// NAV
function sw(name,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('panel-'+name).classList.add('on');
  btn.classList.add('on');
  // close sidebar on mobile when switching panels
  document.querySelector('.sidebar')?.classList.remove('mobile-open');
}

function mobSw(name,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.mob-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('panel-'+name).classList.add('on');
  btn.classList.add('on');
  // sync desktop nav
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  const map={evaluate:0,generate:1,qa:2};
  document.querySelectorAll('.nav-btn')[map[name]]?.classList.add('on');
  // close drawer
  document.getElementById('hist-drawer')?.classList.remove('open');
  // scroll content to top
  document.querySelector('.content')?.scrollTo(0,0);
}

function renderMobSync(){
  const el=document.getElementById('mob-sync-block');
  if(!el) return;
  if(!syncKey){
    el.innerHTML=`<div class="key-setup">
      <p>Paste your sync key to load evaluations on this device.</p>
      <input type="text" id="mob-sync-key-input" placeholder="Your sync key..." style="font-size:16px" />
      <button class="sync-btn" style="align-self:flex-start;padding:6px 14px;font-size:11px" onclick="activateMobSyncKey()">Load data</button>
    </div>`;
  } else {
    el.innerHTML=`<div class="sync-bar">
      <span class="sync-status ${syncKey?'ok':''}" id="mob-sync-status">${syncKey?'Synced':'Not synced'}</span>
      <button class="sync-btn" onclick="loadFromSupabase().then(renderDrawerHist)">Refresh</button>
    </div>`;
  }
}

function activateMobSyncKey(){
  const inp=document.getElementById('mob-sync-key-input');
  const key=inp?.value.trim();
  if(!key){alert('Paste a sync key first.');return;}
  syncKey=key;
  localStorage.setItem('jo_sync_key',syncKey);
  loadFromSupabase().then(()=>{ renderDrawerHist(); renderMobSync(); });
}

function toggleDrawer(btn){
  const drawer=document.getElementById('hist-drawer');
  const isOpen=drawer.classList.contains('open');
  if(isOpen){ closeDrawer(); return; }
  renderMobSync();
  renderDrawerHist();
  drawer.classList.add('open');
  document.querySelectorAll('.mob-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

function closeDrawer(){
  document.getElementById('hist-drawer')?.classList.remove('open');
  // restore active panel tab
  const active=document.querySelector('.panel.on');
  if(active){
    const name=active.id.replace('panel-','');
    const map={evaluate:'mob-evaluate',generate:'mob-generate',qa:'mob-qa'};
    document.querySelectorAll('.mob-btn').forEach(b=>b.classList.remove('on'));
    document.getElementById(map[name])?.classList.add('on');
  }
}

function renderDrawerHist(){
  const el=document.getElementById('hist-list-drawer');
  if(!el) return;
  const q=getSearchQuery();
  let items=history.slice().reverse().map((item,i)=>({item,ri:history.length-1-i}));
  if(activeFilter==='applied') items=items.filter(({item})=>item.applied);
  if(q) items=items.filter(({item})=>(item.role_title||'').toLowerCase().includes(q)||(item.company||'').toLowerCase().includes(q));
  if(!items.length){el.innerHTML=`<div class="no-hist">${activeFilter==='applied'?'No applied roles yet':'No evaluations yet'}</div>`;return;}
  const locClass=loc=>!loc?'':loc.toLowerCase().includes('remote')?' remote':loc.match(/germany|netherlands|spain|portugal|uk|london|berlin|amsterdam|eu|europe/i)?' eu':loc.match(/tx|tn|nc|il|ca|austin|nashville|raleigh|chicago|san francisco|san diego|us|usa/i)?' us':'';
  el.innerHTML=items.map(({item,ri})=>{
    const appliedClass=item.applied?' applied':'';
    const dotClass=item.applied?' on':'';
    const dateStr=item.appliedDate||(item.ts?new Date(item.ts).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'');
    return `<div class="hist-item${selIdx===ri?' on':''}${appliedClass}" onclick="selHistDrawer(${ri})">
      <div class="hgrade h${item.grade}">${item.grade}</div>
      <div class="hinfo">
        <div class="htitle">${item.role_title}</div>
        <div class="hco">${item.company}</div>
        ${item.location?`<span class="hloc${locClass(item.location)}">${item.location}</span>`:''}
        ${dateStr?`<div class="hdate">${item.applied?'Applied '+item.appliedDate:dateStr}</div>`:''}
      </div>
      <div class="applied-dot${dotClass}"></div>
    </div>`;
  }).join('');
}

function selHistDrawer(idx){
  selHist(idx);
  closeDrawer();
}
function swG(name,btn){document.querySelectorAll('.gblock').forEach(g=>g.classList.remove('on'));document.querySelectorAll('.gtab').forEach(b=>b.classList.remove('on'));document.getElementById('gen-'+name).classList.add('on');btn.classList.add('on');}

// FILTER
function setFilter(f,btn){activeFilter=f;document.querySelectorAll('.sf-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderHist();}

// HISTORY
function renderHist() {
  const el = document.getElementById('hist-list');
  const q = getSearchQuery();
  let items = history.slice().reverse().map((item,i)=>({item,ri:history.length-1-i}));
  if (activeFilter==='applied') items=items.filter(({item})=>item.applied);
  if (q) items=items.filter(({item})=>(item.role_title||'').toLowerCase().includes(q)||(item.company||'').toLowerCase().includes(q));
  if (!items.length){el.innerHTML=`<div class="no-hist">${activeFilter==='applied'?'No applied roles yet':'No evaluations yet'}</div>`;return;}
  el.innerHTML=items.map(({item,ri})=>{
    const appliedClass=item.applied?' applied':'';
    const dotClass=item.applied?' on':'';
    const dateStr=item.appliedDate||( item.ts?new Date(item.ts).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'');
    const locClass = item.location ? (item.location.toLowerCase().includes('remote') ? ' remote' : item.location.match(/germany|netherlands|spain|portugal|uk|london|berlin|amsterdam|eu|europe/i) ? ' eu' : item.location.match(/tx|tn|nc|il|ca|austin|nashville|raleigh|chicago|san francisco|san diego|us|usa/i) ? ' us' : '') : '';
    return `<div class="hist-item${selIdx===ri?' on':''}${appliedClass}" onclick="selHist(${ri})">
      <div class="hgrade h${item.grade}">${item.grade}</div>
      <div class="hinfo">
        <div class="htitle">${item.role_title}</div>
        <div class="hco">${item.company}</div>
        ${item.location ? `<span class="hloc${locClass}">${item.location}</span>` : ''}
        ${dateStr?`<div class="hdate">${item.applied?'Applied '+item.appliedDate:dateStr}</div>`:''}
      </div>
      <div class="applied-dot${dotClass}" title="Applied"></div>
    </div>`;
  }).join('');
}

function selHist(idx) {
  selIdx=idx;
  renderHist();
  const item=history[idx];
  // Restore JD into the input box
  if (item.jd) document.getElementById('jd-in').value=item.jd;
  renderScore(item);
  document.getElementById('gen-jd').value=item.jd||'';
  document.getElementById('gen-jd-rb').value=item.jd||'';
  document.getElementById('qa-jd').value=item.jd||'';
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-btn')[0].classList.add('on');
  document.getElementById('panel-evaluate').classList.add('on');
}

function saveHist(data,jd) {
  data.jd=jd;
  data.ts=Date.now();
  data.applied=false;
  data.appliedDate=null;
  data.notes='';
  data.companyInfo=null;
  history.push(data);
  persist();
  selIdx=history.length-1;
  renderHist();
}

function persist(){
  localStorage.setItem('jo_hist',JSON.stringify(history));
  if (syncKey) {
    clearTimeout(syncTimeout);
    syncTimeout = setTimeout(saveToSupabase, 1500);
  }
}

// APPLIED TOGGLE
function toggleApplied(idx) {
  const item=history[idx];
  item.applied=!item.applied;
  item.appliedDate=item.applied?new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):null;
  if (item.applied && !item.companyInfo) lookupCompany(idx);
  persist();
  renderHist();
  renderScore(item);
}

// SAVE NOTES
function saveNotes(idx) {
  const ta=document.getElementById('fu-notes-ta');
  if (ta) { history[idx].notes=ta.value; persist(); }
}

function saveRecruiterName(idx) {

async function genRecruiterMsg(idx) {
  const item=history[idx];
  const recruiterName=document.getElementById('fu-recruiter-name')?.value.trim()||'';
  if (recruiterName) { history[idx].recruiterName=recruiterName; persist(); }

  const prompt=`Write a LinkedIn outreach message FROM Melissa Moreira to a recruiter or hiring contact. Follow this exact structure and format:

${PROFILE}

ROLE: ${item.role_title} at ${item.company}
CONTACT NAME: ${recruiterName||'(use "Hi there" if no name)'}
APPLIED: ${item.appliedDate||'recently'}

REQUIRED FORMAT — follow this structure exactly:

Hi [contact name],

I saw that [company] is looking for a [role title] and wanted to reach out directly. If there's a better person to connect with, just point me in the right direction.

[One paragraph, 2-3 sentences: match Nick's most relevant real experience to what this specific role needs. Be specific — name actual projects, products, or companies. Do NOT use generic phrases like "proven track record" or "passionate about design". Pull from his real case studies and work history to show genuine fit for this specific role and company.]

If you're curious, here's my portfolio: nicknewhart.com

Thank you for your time!

RULES:
- No em dashes anywhere
- First person, conversational, sounds like a human not an AI
- The body paragraph must reference real projects by name (roam., LiveBy, Brandzooka, etc.)
- Keep the whole message under 150 words
- Output only the message text, no subject line, no markdown`;

  const btn=document.getElementById('gen-msg-btn');
  const loader=document.getElementById('recruiter-msg-loader');
  const wrap=document.getElementById('recruiter-msg-wrap');
  if(btn)btn.disabled=true;
  if(loader){loader.style.display='flex';}
  if(wrap)wrap.style.display='none';

  try {
    const txt=await call(prompt, 500);
    history[idx].recruiterMsg=txt.trim();
    persist();
    document.getElementById('recruiter-msg-out').textContent=txt.trim();
    if(wrap)wrap.style.display='flex';
  } catch(e) { alert('Error: '+e.message); }
  finally {
    if(btn)btn.disabled=false;
    if(loader)loader.style.display='none';
  }
}

// COMPANY LOOKUP
async function lookupCompany(idx) {
  const item=history[idx];
  if (!item.company) return;
  // Show loading state in follow-up card if already rendered
  const ciEl=document.getElementById('company-info-content');
  if (ciEl) ciEl.innerHTML='<span class="ci-loading">Looking up company info...</span>';
  try {
    const raw=await call(COMPANY_PROMPT(item.company),300);
    const info=JSON.parse(raw.replace(/```json|```/g,'').trim());

    if (selIdx===idx) renderScore(history[idx]);

    history[idx].companyInfo={website:null,careers_email:null,careers_page:null};
    persist();
  }
}

// RENDER SCORE CARD
function renderScore(d) {
  const idx=selIdx!==null?selIdx:history.length-1;
  const item=history[idx]||d;
  const gc={A:'bA',B:'bB',C:'bC',D:'bD',F:'bF'};

  const dims=(d.dimensions||[]).map(dim=>{
    const p=Math.round(dim.score);
    const fc=p>=70?'dhi':p>=45?'dmid':'dlo';
    return `<div class="dim">
      <div class="dname">${dim.name}</div>
      <div class="dbar-row"><div class="dbar"><div class="dfill ${fc}" style="width:${p}%"></div></div><div class="dpct">${p}</div></div>
      <div class="dnote">${dim.note}</div>
    </div>`;
  }).join('');

  const pills=(arr,cls)=>(arr||[]).map(s=>`<span class="pill ${cls}">${s}</span>`).join('');
  const salaryPill=d.salary?`<span class="salary-pill">${d.salary}</span>`:'';
  const locationPill=d.location?`<span class="salary-pill" style="background:var(--bg3);color:var(--text2);border-color:var(--border2)">${d.location}</span>`:'';
  const appliedPill=item.applied?`<span class="applied-pill on">Applied ${item.appliedDate||''}</span>`:'';
  const appliedBtnLabelFull=item.applied?'Applied ✓':'Mark as Applied';
  const appliedBtnLabelShort=item.applied?'Applied ✓':'+ Applied';
  const appliedBtnClass=item.applied?'btn btn-sm btn-applied is-applied':'btn btn-sm btn-applied';

  // Company info block
  let companyBlock='';
  if (item.companyInfo) {
    const ci=item.companyInfo;
    const hasAny=ci.website||ci.careers_email||ci.careers_page;
    companyBlock=`<div>
      <div class="sdiv">Company</div>
      <div class="company-info" id="company-info-content">
        ${ci.website?`<div class="ci-row"><span class="ci-label">Site</span><span class="ci-val"><a href="${ci.website}" target="_blank">${ci.website}</a></span></div>`:''}
        ${ci.careers_page?`<div class="ci-row"><span class="ci-label">Careers</span><span class="ci-val"><a href="${ci.careers_page}" target="_blank">${ci.careers_page}</a></span></div>`:''}
        ${ci.careers_email?`<div class="ci-row"><span class="ci-label">Email</span><span class="ci-val"><a href="mailto:${ci.careers_email}">${ci.careers_email}</a></span></div>`:''}
        ${!hasAny?`<span class="ci-loading">No company info found</span>`:''}
      </div>
    </div>`;
  } else if (item.applied) {
    companyBlock=`<div>
      <div class="sdiv">Company</div>
      <div class="company-info"><div id="company-info-content"><span class="ci-loading">Looking up company info...</span></div></div>
    </div>`;
  }

  // Follow-up block (only when applied)
  let followupBlock='';
  if (item.applied) {
    const ci=item.companyInfo||{};
    followupBlock=`<div>
      <div class="sdiv">Follow-up</div>
      <div class="followup-card">
        <div class="followup-title">Application tracker</div>
        <div class="followup-grid">
          <div class="fu-item"><div class="fu-label">Applied</div><div class="fu-val">${item.appliedDate||'—'}</div></div>
          <div class="fu-item"><div class="fu-label">Company site</div><div class="fu-val">${ci.website?`<a href="${ci.website}" target="_blank">${ci.website}</a>`:'Pending lookup...'}</div></div>
          <div class="fu-item"><div class="fu-label">Careers</div><div class="fu-val">${ci.careers_page?`<a href="${ci.careers_page}" target="_blank">View page</a>`:'—'}</div></div>
          <div class="fu-item"><div class="fu-label">Contact</div><div class="fu-val">${ci.careers_email?`<a href="mailto:${ci.careers_email}">${ci.careers_email}</a>`:'—'}</div></div>
        </div>
        <div class="fu-notes field">
          <label class="fu-label" style="margin-bottom:6px">Notes</label>
          <textarea id="fu-notes-ta" rows="3" placeholder="Add follow-up notes, next steps..." onblur="saveNotes(${idx})">${item.notes||''}</textarea>
        </div>
        <div style="border-top:1px solid var(--purple-border);padding-top:14px;display:flex;flex-direction:column;gap:10px">
          <div class="fu-label">Recruiter outreach</div>
          <div style="display:flex;gap:8px;align-items:center">
            <input type="text" id="fu-recruiter-name" placeholder="Recruiter or contact name (optional)..." value="${item.recruiterName||''}" onblur="saveRecruiterName(${idx})" style="flex:1;background:var(--bg2);border:1px solid var(--purple-border);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:13px;padding:9px 12px;outline:none;transition:border-color 0.15s" />
            <button class="btn btn-sm btn-applied" id="gen-msg-btn" onclick="genRecruiterMsg(${idx})">Generate message</button>
          </div>
          <div id="recruiter-msg-loader" style="display:none;flex-direction:column;gap:6px"><div class="ltext">Writing your outreach message...</div><div class="lbar"><div class="lfill"></div></div></div>
          <div id="recruiter-msg-wrap" style="display:${item.recruiterMsg?'flex':'none'};flex-direction:column;gap:8px">
            <div style="display:flex;align-items:center;justify-content:space-between"><span class="fu-label">Message</span><button class="btn btn-sm btn-ghost" onclick="cpText('recruiter-msg-out')">Copy</button></div>
            <div id="recruiter-msg-out" style="background:var(--bg2);border:1px solid var(--purple-border);border-radius:var(--r);padding:14px 16px;font-size:13px;line-height:1.75;color:var(--text);white-space:pre-wrap">${item.recruiterMsg||''}</div>
          </div>
        </div>
      </div>
    </div>`;
  }

  document.getElementById('eval-result').innerHTML=`
    <div class="score-card">
      <div class="sc-top">
        <div class="sc-badge ${gc[d.grade]||'bC'}">${d.grade}</div>
        <div class="sc-meta">
          <div class="sc-role"><span class="sc-grade-inline sc-badge ${gc[d.grade]||'bC'}">${d.grade}</span>${d.role_title}</div>
          <div class="sc-co">${d.company}</div>
          <div class="sc-pills">
            <span class="verdict-pill v${d.verdict}">${d.verdict}</span>
            ${salaryPill}
            ${locationPill}
            ${appliedPill}
          </div>
        </div>
        <div class="sc-actions">
          <button class="${appliedBtnClass}" onclick="toggleApplied(${idx})"><span class="full-label">${appliedBtnLabelFull}</span><span class="short-label">${appliedBtnLabelShort}</span></button>
        </div>
      </div>
      <div class="dims">${dims}</div>
      ${d.strengths?.length?`<div><div class="sdiv">Matched skills</div><div class="pill-row">${pills(d.strengths,'pg')}</div></div>`:''}
      ${d.gaps?.length?`<div><div class="sdiv">Gaps</div><div class="pill-row">${pills(d.gaps,'pr')}</div></div>`:''}
      ${d.highlights?.length?`<div><div class="sdiv">Strong signals</div><div class="pill-row">${pills(d.highlights,'pb')}</div></div>`:''}
      <div class="sc-summary">${d.summary}</div>
    </div>
    ${companyBlock}
    ${followupBlock}`;
}

// Q&A
function addQ(){if(qCount>=5)return;qCount++;const n=qCount;const el=document.createElement('div');el.className='q-slot';el.id='qs'+n;el.innerHTML=`<div class="q-top"><span class="qn">Question ${n}</span><button class="qrm" onclick="rmQ(${n})">Remove</button></div><textarea id="qi${n}" rows="2" placeholder="e.g. Why do you want to work here?"></textarea>`;document.getElementById('q-slots').appendChild(el);if(qCount>=5)document.getElementById('add-q').style.display='none';}
function rmQ(n){const el=document.getElementById('qs'+n);if(el)el.remove();qCount=Math.max(0,qCount-1);document.getElementById('add-q').style.display='block';}

async function genQA(){
  const jd=document.getElementById('qa-jd').value.trim();

}

// API
async function call(prompt,maxTokens){
  const res=await fetch('/api/proxy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTokens||1000,messages:[{role:'user',content:prompt}]})});
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||'API error '+res.status);}
  const data=await res.json();
  return data.content[0].text;
}

// UTILS
function setLoad(id,on){const l=document.getElementById(id+'-load');const b=document.getElementById(id+'-btn');if(l)l.classList[on?'add':'remove']('on');if(b)b.disabled=on;}
function cpText(id){
  const el=document.getElementById(id);
  if(!el)return;
  navigator.clipboard.writeText(el.innerText||el.textContent).then(()=>{
    const btn=el.previousElementSibling?.querySelector('.btn-ghost');
    if(btn){const o=btn.textContent;btn.textContent='Copied!';setTimeout(()=>btn.textContent=o,1500);}
  });
}

function cp(id){const el=document.getElementById(id);navigator.clipboard.writeText(el.innerText||el.textContent).then(()=>{const btn=el.closest('.out-wrap')?.querySelector('.btn-ghost');if(btn){const o=btn.textContent;btn.textContent='Copied!';setTimeout(()=>btn.textContent=o,1500);}});}
</script>
